<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1 {
            background-color: lightgray;
            height: 300px;
            width: 300px;
            border-width: 10px;
            border-style: solid;
            border-color: darkslategray;
            /*exemplificando o border
            border: 10px solid darkslategray; */

            /*serve para espaçar oque está dentro do box*/
            padding-top: 10px;  
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
            /*exemplificando o padding
            padding: 10px;*/


            /*margin:auto; serve para centralizar boxes*/
            margin-top: 10px;
            margin-right: 10px;
            margin-left: 10px;
            margin-bottom: 10px;

            /*exemplificando o margin
            margin: 10px auto 10px auto;*/
        }

        a {
            border-width: 10px;
            border-style: solid;
            border-color: red;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os 
        <a href="#">links são exemplos de caixas inline-level</a>.
        Vamos ver
    </p>
</body>
</html>
