<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-classes</title>
    <style> 
        div {
            display: inline-block;
            width: 200px;
            height: 200px;
            background-color: white;
            border:  1px solid black;
            text-align: center;
            vertical-align: middle;
            line-height: 200px;
        }

        div:hover {
            background-color: grey;
        }
    </style>
</head>
<body>
    <div><a href="https://mail.google.com/mail/u/0/#inbox" >01</a></div>
    <div><a href="">02</a></div>
    <div><a href="">03</a></div>
</body>
</html>
