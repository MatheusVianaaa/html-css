<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Hover</title>
    <style>
        div > p {
            display: none;
        }
        div:hover {
            background-color: lightcoral;
        }

        div:hover > p {
            display: block;
            background-color: rgb(61, 30, 30);
        }
        body {
            color: aqua;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <h1>Exemplo de Hover</h1>    
    <p>Passe o mouse sobre este texto para ver o efeito de hover.</p>
    <div>Passe o mouse aqui
        <p>Texto escondido</p>
    </div>

    <p>Fim do Exemplo</p>
</body>
</html>
