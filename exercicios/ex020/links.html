<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links
    </title>
    <style>
        /*
        # = id
        . = class
        : = pseudo-class
        :: = pseudo-element
        > = children
        
        
        */
        body{
            font-family: 'Work-sans, sans-serif';
        }
        a{
        color: red;
        text-decoration: none;
        font-weight: bold;
        }
        a:visited{
            color:darkred;
        }
        a:active{
            color: black;
            text-decoration: underline;
        }

        .especial{
            background-color: darkred;
        }
        /*a::before{
            content: ''
        }*/
        a::after{
            content:'[link]';
            text-decoration: none;
            font-weight: normal;
            color: darkgrey;
        }
    </style>
</head>
<body>
    <h1>Personalizando Links</h1> 
    <ul>
        <li><a href="pseudoclasse.html" target="_blank">Repositorio Github</a></li>
        <li>Canal do Youtube</li>
        <li>Site do CursoemVideo</li>
    </ul>
</body>
</html>
