<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: 'lovely';
            src:url('fonts/OldeEnglish.ttf') format('truetype');
                font-weight: normal;
                font-style: normal;
        }
        body {
            font-family: 'lovely', Times, serif;
            color: black;
        }

        /*  
        Tipos de format()  
        - truetype(ttf)
        - opentype(otf)
        - woff
        - embedded-opentype
        - truetype-aat
        */
        h1 {
            font-family: 'lovely', Times, serif;
            color: black;
            font-size: 3em;
        }
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Aperiam sit, veniam vero eum consequatur architecto tempore sed! Culpa quos quaerat doloribus autem perspiciatis, nemo voluptas cumque consequuntur eum nulla distinctio!</p>
</body>
</html>
